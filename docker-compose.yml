version: '3.8'

services:

  server1:
    image: httpd:2.4
    container_name: server1
    ports:
      - "8081:80"
    volumes:
      - ./server1:/usr/local/apache2/htdocs/

  server2:
    image: httpd:2.4
    container_name: server2
    ports:
      - "8082:80"
    volumes:
      - ./server2:/usr/local/apache2/htdocs/